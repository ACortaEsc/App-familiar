<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Casa Família">
<meta name="theme-color" content="#ffffff">
<title>Casa Família</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#fff;--bg2:#f6f5f2;--bg3:#eeecea;
  --text:#1a1a1a;--text2:#666660;--text3:#aaa9a3;
  --border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.16);
  --r:12px;--rsm:8px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --pare:#1a4fa8;--pare-bg:#e8f0fc;
  --mare:#8a1a5e;--mare-bg:#f7e8f2;
  --familia:#2a6e3f;--familia-bg:#e6f3ea;
  --urgent:#E24B4A;--urgent-bg:#FCEBEB;
  --warn:#EF9F27;--warn-bg:#FAEEDA;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;--text:#f5f5f0;--text2:#aeaead;--text3:#6e6e73;--border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.18);--pare-bg:#0e2040;--mare-bg:#2e0a20;--familia-bg:#0a2414;--urgent-bg:#3d1010;--warn-bg:#3d2a08}
  .prio-badge.alta{background:#3d1f1f;color:#f09595}
  .prio-badge.mitjana{background:#3d2e10;color:#FAC775}
  .prio-badge.baixa{background:#1a2e1a;color:#97C459}
  input,select,textarea{background:#2c2c2e!important;color:#f5f5f0!important;border-color:rgba(255,255,255,0.15)!important}
  .task,.add-form,.despesa-item,.resum-card,.chart-wrap,.cal-day,.scan-box{background:#2c2c2e}
  .saved-item{background:#2c2c2e;color:#aeaead}
  .tab{background:#2c2c2e}.tab.active{background:#f5f5f0;color:#1a1a1a}
  .nav-btn{color:#aeaead}.nav-btn.active{color:#f5f5f0;border-top-color:#f5f5f0}
  .cal-day.today{border-color:rgba(255,255,255,0.5)}
  .task.vencuda{background:#2d1a1a}.task.proxima{background:#2d2510}
  .scan-btn{background:#2c2c2e;color:#aeaead}
}
html,body{height:100%;background:var(--bg3);font-family:var(--font);color:var(--text)}
.shell{max-width:640px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--bg3)}

/* HEADER */
header{background:var(--bg);border-bottom:0.5px solid var(--border);padding:12px 16px 10px;position:sticky;top:0;z-index:10}
.header-title{font-size:19px;font-weight:700;letter-spacing:-0.3px}
.header-sub{font-size:12px;color:var(--text3);margin-top:2px}

/* NAV */
.bottom-nav{background:var(--bg);border-top:0.5px solid var(--border);display:flex;position:sticky;bottom:0;z-index:10}
.nav-btn{flex:1;padding:10px 0 8px;border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--text3);font-family:var(--font);font-size:10px;border-top:2px solid transparent;transition:all 0.15s;position:relative}
.nav-btn.active{color:var(--text);border-top-color:var(--text)}
.nav-icon{font-size:20px;line-height:1}
.nav-alert{position:absolute;top:6px;right:calc(50% - 18px);background:var(--urgent);color:#fff;font-size:9px;font-weight:700;border-radius:999px;padding:1px 4px;min-width:14px;text-align:center;line-height:1.5}

.content{flex:1;padding:14px 14px 6px;overflow-y:auto}
.screen{display:none}.screen.active{display:block}

/* TABS */
.tabs-wrap{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px}
.tabs-wrap::-webkit-scrollbar{display:none}
.tab{padding:6px 13px;border-radius:999px;border:0.5px solid var(--border2);font-size:13px;cursor:pointer;background:var(--bg);color:var(--text2);white-space:nowrap;display:inline-flex;align-items:center;gap:5px;transition:background 0.15s}
.tab.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.badge{font-size:11px;background:rgba(255,255,255,0.22);border-radius:999px;padding:1px 5px}
.tab:not(.active) .badge{background:var(--bg3);color:var(--text3)}

/* PERSONA FILTER TABS */
.person-tabs{display:flex;gap:5px;margin-bottom:12px}
.ptab{padding:5px 12px;border-radius:999px;border:0.5px solid var(--border2);font-size:12px;cursor:pointer;font-weight:500;transition:all 0.15s}
.ptab.all{background:var(--bg2);color:var(--text2)}
.ptab.all.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.ptab.pare{background:var(--pare-bg);color:var(--pare);border-color:var(--pare-bg)}
.ptab.pare.active{border-color:var(--pare)}
.ptab.mare{background:var(--mare-bg);color:var(--mare);border-color:var(--mare-bg)}
.ptab.mare.active{border-color:var(--mare)}
.ptab.familia{background:var(--familia-bg);color:var(--familia);border-color:var(--familia-bg)}
.ptab.familia.active{border-color:var(--familia)}

/* FORMS */
.add-form{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:14px;display:flex;flex-direction:column;gap:8px}
.add-row{display:flex;gap:7px;align-items:center}
input[type="text"],input[type="number"],input[type="date"]{flex:1;height:38px;padding:0 11px;border:0.5px solid var(--border2);border-radius:var(--rsm);font-size:14px;color:var(--text);background:var(--bg);outline:none;font-family:var(--font)}
input[type="text"]:focus,input[type="number"]:focus,input[type="date"]:focus{border-color:var(--text2)}
input[type="date"]{padding:0 8px}
select{height:38px;padding:0 8px;border:0.5px solid var(--border2);border-radius:var(--rsm);font-size:13px;color:var(--text);background:var(--bg);cursor:pointer;font-family:var(--font)}
.add-btn{height:38px;padding:0 15px;border-radius:var(--rsm);border:none;background:var(--text);color:var(--bg);font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:var(--font);flex-shrink:0}
.row-label{font-size:12px;color:var(--text2);white-space:nowrap;flex-shrink:0}

/* TASKS */
.tasks{display:flex;flex-direction:column;gap:6px}
.task{display:flex;align-items:flex-start;gap:9px;padding:10px 11px;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r);transition:opacity 0.3s;border-left:3px solid transparent}
.task.prio-alta{border-left-color:#E24B4A}
.task.prio-mitjana{border-left-color:#EF9F27}
.task.prio-baixa{border-left-color:#1D9E75}
.task.vencuda{border-left-color:var(--urgent)!important;background:var(--urgent-bg)}
.task.proxima{border-left-color:var(--warn)!important;background:var(--warn-bg)}
.check{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:transparent;transition:all 0.15s;margin-top:1px}
.check.checked{background:var(--text);border-color:var(--text)}
.check.checked::after{content:'';display:block;width:5px;height:8px;border:2px solid var(--bg);border-top:none;border-left:none;transform:rotate(45deg) translateY(-1px)}
.task-body{flex:1;min-width:0}
.task-text{font-size:14px;line-height:1.3}
.task-text.done{text-decoration:line-through;color:var(--text3)}
.task-meta{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px;align-items:center}
.prio-badge{font-size:11px;padding:2px 6px;border-radius:999px;font-weight:500}
.prio-badge.alta{background:#FCEBEB;color:#A32D2D}
.prio-badge.mitjana{background:#FAEEDA;color:#633806}
.prio-badge.baixa{background:#EAF3DE;color:#3B6D11}
.user-badge{font-size:11px;padding:2px 7px;border-radius:999px;font-weight:500}
.user-badge.pare{background:var(--pare-bg);color:var(--pare)}
.user-badge.mare{background:var(--mare-bg);color:var(--mare)}
.user-badge.familia{background:var(--familia-bg);color:var(--familia)}
.deadline-badge{font-size:11px;padding:2px 7px;border-radius:999px;font-weight:500}
.deadline-badge.ok{background:var(--bg2);color:var(--text2)}
.deadline-badge.proxima{background:var(--warn-bg);color:#854F0B}
.deadline-badge.vencuda{background:var(--urgent-bg);color:#A32D2D}
.del-btn{width:26px;height:26px;border-radius:50%;border:none;background:transparent;cursor:pointer;color:var(--text3);font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1;margin-top:1px}
.del-btn:active{background:#FCEBEB;color:#A32D2D}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--text3);font-size:14px;border:0.5px dashed var(--border2);border-radius:var(--r)}
.section-label{font-size:12px;color:var(--text3);padding:8px 4px 4px}
.list-meta{margin-bottom:12px}
.list-meta h2{font-size:16px;font-weight:600}
.list-meta p{font-size:13px;color:var(--text2);margin-top:1px}

/* SUPER */
.divider{border:none;border-top:0.5px solid var(--border);margin:14px 0}
.super-label{font-size:13px;color:var(--text2);margin-bottom:8px;font-weight:500}
.saved-items{display:flex;flex-wrap:wrap;gap:6px}
.saved-item{padding:5px 11px;border-radius:999px;border:0.5px solid var(--border2);font-size:13px;cursor:pointer;color:var(--text2);background:var(--bg2)}
.saved-item.in-list{opacity:0.35;pointer-events:none}

/* CALENDARI */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-header h3{font-size:15px;font-weight:600}
.cal-nav{display:flex;align-items:center;gap:6px}
.cal-nav button{width:28px;height:28px;border-radius:50%;border:0.5px solid var(--border2);background:var(--bg);color:var(--text);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.cal-nav span{font-size:13px;font-weight:500;min-width:120px;text-align:center}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px}
.cal-day{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rsm);padding:5px 3px;min-height:60px}
.cal-day.today{border:1.5px solid var(--text)}
.cal-day-name{font-size:9px;color:var(--text3);text-align:center;margin-bottom:2px;text-transform:uppercase}
.cal-day-num{font-size:13px;font-weight:600;text-align:center;margin-bottom:3px}
.cal-day.today .cal-day-num{color:var(--pare)}
.cal-task-mini{font-size:9px;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;border-radius:3px;padding:1px 3px;margin-top:2px}
.cal-task-mini.vencuda{background:var(--urgent-bg);color:#A32D2D}
.cal-task-mini.proxima{background:var(--warn-bg);color:#854F0B}
.cal-task-mini.ok{background:var(--bg2);color:var(--text2)}
.urgents-title{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:8px}

/* SCAN */
.scan-box{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:10px}
.scan-title{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:8px}
.scan-btn{width:100%;height:44px;border-radius:var(--rsm);border:1px dashed var(--border2);background:var(--bg2);color:var(--text2);font-size:13px;cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.15s}
.scan-btn:hover{border-color:var(--text);color:var(--text)}
.scan-row{display:flex;gap:8px;align-items:center}
.scan-preview{width:44px;height:44px;object-fit:cover;border-radius:6px;border:0.5px solid var(--border);flex-shrink:0;display:none}
.scan-status{margin-top:8px;font-size:12px;color:var(--text2);display:flex;align-items:center;gap:6px;min-height:18px}
.spinner{width:13px;height:13px;border:2px solid var(--border2);border-top-color:var(--text);border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* DESPESES */
.despesa-item{display:flex;align-items:center;gap:9px;padding:10px 11px;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r)}
.desp-cat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.desp-info{flex:1;min-width:0}
.desp-desc{font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.desp-meta{font-size:12px;color:var(--text2);margin-top:1px}
.desp-amount{font-size:15px;font-weight:600;flex-shrink:0}
.desp-amount.pare{color:var(--pare)}.desp-amount.mare{color:var(--mare)}.desp-amount.familia{color:var(--familia)}
.resum-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.resum-header h3{font-size:15px;font-weight:600}
.month-nav{display:flex;align-items:center;gap:6px}
.month-nav button{width:28px;height:28px;border-radius:50%;border:0.5px solid var(--border2);background:var(--bg);color:var(--text);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.month-label{font-size:13px;font-weight:500;min-width:100px;text-align:center}
.totals-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:14px}
.resum-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r);padding:8px 10px;text-align:center}
.resum-card .label{font-size:10px;color:var(--text2);margin-bottom:3px}
.resum-card .amount{font-size:15px;font-weight:700}
.resum-card .amount.pare{color:var(--pare)}.resum-card .amount.mare{color:var(--mare)}.resum-card .amount.familia{color:var(--familia)}
.chart-wrap{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:14px}
.chart-title{font-size:13px;font-weight:500;margin-bottom:4px;color:var(--text2)}
.chart-legend{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2)}
.legend-dot{width:8px;height:8px;border-radius:50%}
.bar-group{margin-bottom:10px}
.bar-cat-label{font-size:12px;color:var(--text2);margin-bottom:3px}
.bar-row-inner{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.bar-who{font-size:10px;color:var(--text3);width:30px;flex-shrink:0;text-align:right}
.bar-track{flex:1;height:14px;background:var(--bg3);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width 0.5s;display:flex;align-items:center;justify-content:flex-end;padding-right:5px;min-width:2px}
.bar-val{font-size:10px;font-weight:600;color:#fff;white-space:nowrap}
.no-data{text-align:center;padding:2rem;color:var(--text3);font-size:14px}
.despeses-llista{display:flex;flex-direction:column;gap:6px;margin-top:14px}

/* TOAST */
.toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--text);color:var(--bg);padding:8px 16px;border-radius:999px;font-size:13px;font-weight:500;opacity:0;transition:all 0.25s;pointer-events:none;white-space:nowrap;z-index:200}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="shell">

<header>
  <div class="header-title">🏠 Casa Família</div>
  <div class="header-sub" id="header-sub"></div>
</header>

<div class="content" style="flex:1;overflow-y:auto">

  <!-- TASQUES -->
  <div class="screen active" id="screen-tasques">
    <div class="tabs-wrap" id="llista-tabs"></div>
    <div id="llista-content"></div>
  </div>

  <!-- CALENDARI -->
  <div class="screen" id="screen-calendari">
    <div class="cal-header">
      <h3>Calendari setmanal</h3>
      <div class="cal-nav">
        <button onclick="changeWeek(-1)">‹</button>
        <span id="week-label"></span>
        <button onclick="changeWeek(1)">›</button>
      </div>
    </div>
    <div class="week-grid" id="week-grid"></div>
    <div id="urgents-section"></div>
  </div>

  <!-- DESPESES -->
  <div class="screen" id="screen-despeses">

    <!-- SCAN -->
    <div class="scan-box">
      <div class="scan-title">📷 Escanejar tiquet amb IA</div>
      <div class="scan-row">
        <button class="scan-btn" id="scan-trigger" onclick="document.getElementById('scan-input').click()">
          <span>📷</span> Fer foto o triar imatge
        </button>
        <img id="scan-preview" class="scan-preview">
      </div>
      <input type="file" id="scan-input" accept="image/*" style="display:none" onchange="scanReceipt(this)">
      <div class="scan-status" id="scan-status"></div>
    </div>

    <!-- FORMULARI -->
    <div class="add-form">
      <div class="add-row"><input type="text" id="desp-desc" placeholder="Descripció de la despesa..."></div>
      <div class="add-row">
        <input type="number" id="desp-import" placeholder="Import (€)" min="0" step="0.01" style="flex:0.5;min-width:80px">
        <select id="desp-cat" style="flex:1">
          <option value="alimentacio">🛒 Alimentació</option>
          <option value="transport">🚗 Transport</option>
          <option value="casa">🏠 Casa</option>
          <option value="oci">🎭 Oci</option>
          <option value="salut">💊 Salut</option>
          <option value="roba">👕 Roba</option>
          <option value="altres">📦 Altres</option>
        </select>
      </div>
      <div class="add-row">
        <select id="desp-qui" style="flex:1">
          <option value="pare">👨 Pare</option>
          <option value="mare">👩 Mare</option>
          <option value="familia">👨‍👩‍👧 Família</option>
        </select>
        <button class="add-btn" onclick="addDespesa()">Afegir</button>
      </div>
    </div>

    <div class="resum-header">
      <h3>Resum mensual</h3>
      <div class="month-nav">
        <button onclick="changeMonth(-1)">‹</button>
        <div class="month-label" id="month-label"></div>
        <button onclick="changeMonth(1)">›</button>
      </div>
    </div>
    <div class="totals-row" id="totals-row"></div>
    <div class="chart-wrap" id="chart-wrap"></div>

    <!-- FILTRE DESPESES -->
    <div class="person-tabs" id="desp-filter-tabs"></div>
    <div class="despeses-llista" id="despeses-llista"></div>
  </div>

</div>

<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-tasques" onclick="setScreen('tasques')">
    <span class="nav-icon">✅</span>Tasques
  </button>
  <button class="nav-btn" id="nav-calendari" onclick="setScreen('calendari')">
    <span class="nav-icon">📅</span>Calendari
  </button>
  <button class="nav-btn" id="nav-despeses" onclick="setScreen('despeses')">
    <span class="nav-icon">💶</span>Despeses
  </button>
</nav>

<div class="toast" id="toast"></div>

</div>
<script>
const LLISTES=[
  {id:'olot',name:'Olot',icon:'🏡',desc:'Casa Olot',isSuper:false},
  {id:'escala',name:"Casa",icon:'⛵',desc:"Casa",isSuper:false},
  {id:'super',name:'Súper',icon:'🛒',desc:'Llista de la compra',isSuper:true}
];
const PRIOS=['alta','mitjana','baixa'];
const PL={alta:'Alta',mitjana:'Mitjana',baixa:'Baixa'};
const PO={alta:0,mitjana:1,baixa:2};
const USUARIS=['familia','pare','mare'];
const UL={familia:'Família',pare:'Pare',mare:'Mare'};
const CATS={
  alimentacio:{label:'Alimentació',color:'#1D9E75'},
  transport:{label:'Transport',color:'#378ADD'},
  casa:{label:'Casa',color:'#EF9F27'},
  oci:{label:'Oci',color:'#D4537E'},
  salut:{label:'Salut',color:'#E24B4A'},
  roba:{label:'Roba',color:'#7F77DD'},
  altres:{label:'Altres',color:'#888780'}
};
const MESOS=['Gener','Febrer','Març','Abril','Maig','Juny','Juliol','Agost','Setembre','Octubre','Novembre','Desembre'];
const DIES=['Dl','Dt','Dc','Dj','Dv','Ds','Dg'];

const DEF={
  tasks:{olot:[],escala:[],super:[]},
  savedSuper:['Llet','Pa','Fruita','Ous','Formatge','Pasta','Arròs','Oli'],
  despeses:[],nextId:1,
  newText:{olot:'',escala:'',super:''},
  newPerson:{olot:'familia',escala:'familia',super:'familia'},
  newPrio:{olot:'mitjana',escala:'mitjana',super:'mitjana'},
  newDeadline:{olot:'',escala:'',super:''},
  activeLlista:'olot',
  despFilter:'all'
};

function load(){try{const s=localStorage.getItem('casa-v5');if(s)return JSON.parse(s);}catch(e){}return JSON.parse(JSON.stringify(DEF));}
function save(){try{localStorage.setItem('casa-v5',JSON.stringify(state));}catch(e){}}

let state=load();
['despeses','savedSuper','newDeadline','despFilter'].forEach(k=>{if(state[k]==null)state[k]=DEF[k];});

let activeScreen='tasques',viewMonth=new Date(),weekOffset=0;

/* UTILS */
function dStatus(s){
  if(!s)return null;
  const t=new Date();t.setHours(0,0,0,0);
  const d=new Date(s);d.setHours(0,0,0,0);
  const diff=Math.round((d-t)/864e5);
  if(diff<0)return{status:'vencuda',label:'Vençuda',diff};
  if(diff<=3)return{status:'proxima',label:diff===0?'Avui':diff===1?'Demà':`En ${diff} dies`,diff};
  return{status:'ok',label:`${d.getDate()} ${MESOS[d.getMonth()].slice(0,3)}`,diff};
}
function toISO(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escA(s){return String(s).replace(/'/g,"\\'");}
function fmt(n){return n.toFixed(2).replace('.',',')+' €';}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

/* SCREEN */
function setScreen(s){
  activeScreen=s;
  document.querySelectorAll('.screen').forEach(el=>el.classList.remove('active'));
  document.getElementById('screen-'+s).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-'+s).classList.add('active');
  render();
}
function render(){
  updateBadge();
  if(activeScreen==='tasques')renderTasques();
  else if(activeScreen==='calendari')renderCal();
  else renderDespeses();
}
function updateBadge(){
  const all=Object.values(state.tasks).flat().filter(t=>!t.done&&t.deadline);
  const n=all.filter(t=>{const ds=dStatus(t.deadline);return ds&&ds.status!=='ok';}).length;
  const btn=document.getElementById('nav-calendari');
  let b=btn.querySelector('.nav-alert');
  if(n>0){if(!b){b=document.createElement('span');b.className='nav-alert';btn.appendChild(b);}b.textContent=n;}
  else if(b)b.remove();
}

/* ---- TASQUES ---- */
function sortTasks(tasks){
  return[...tasks].sort((a,b)=>{
    if(a.done!==b.done)return a.done?1:-1;
    const da=dStatus(a.deadline),db=dStatus(b.deadline);
    const sa=da?da.diff:9999,sb=db?db.diff:9999;
    if(!a.done&&sa!==sb)return sa-sb;
    return PO[a.prio]-PO[b.prio];
  });
}

function renderTasques(){
  const al=state.activeLlista;
  const list=LLISTES.find(l=>l.id===al);

  // tabs
  document.getElementById('llista-tabs').innerHTML=LLISTES.map(l=>{
    const cnt=state.tasks[l.id].filter(t=>!t.done).length;
    return`<button class="tab ${l.id===al?'active':''}" onclick="setLlista('${l.id}')">${l.icon} ${l.name}${cnt>0?`<span class="badge">${cnt}</span>`:''}</button>`;
  }).join('');

  const tasks=sortTasks(state.tasks[al]);
  const pending=tasks.filter(t=>!t.done),done=tasks.filter(t=>t.done);
  document.getElementById('header-sub').textContent=`${pending.length} tasca${pending.length!==1?'s':''} pendent${pending.length!==1?'s':''}`;

  const tHtml=t=>{
    const isS=list.isSuper;
    const ds=!isS?dStatus(t.deadline):null;
    const ec=ds&&!t.done?(ds.status==='vencuda'?'vencuda':ds.status==='proxima'?'proxima':''):'';
    const db=ds&&!t.done?`<span class="deadline-badge ${ds.status}">📅 ${ds.label}</span>`:'';
    const meta=isS?'':`<div class="task-meta"><span class="prio-badge ${t.prio}">${PL[t.prio]}</span><span class="user-badge ${t.user}">${UL[t.user]}</span>${db}</div>`;
    return`<div class="task ${isS?'':('prio-'+t.prio+' '+ec)}" id="task-${t.id}">
      <div class="check ${t.done?'checked':''}" onclick="toggleTask(${t.id})"></div>
      <div class="task-body"><div class="task-text ${t.done?'done':''}">${esc(t.text)}</div>${meta}</div>
      <button class="del-btn" onclick="deleteTask(${t.id})">×</button>
    </div>`;
  };

  const inList=text=>state.tasks['super'].some(t=>t.text===text&&!t.done);
  const ss=list.isSuper?`<hr class="divider"><div class="super-label">Articles habituals</div><div class="saved-items">${state.savedSuper.map(i=>`<div class="saved-item ${inList(i)?'in-list':''}" onclick="addSaved('${escA(i)}')">${esc(i)}</div>`).join('')}</div>`:'';
  const today=toISO(new Date());

  const formRows=list.isSuper
    ?`<div class="add-row">
        <input type="text" id="new-text" placeholder="Nou article..." value="${escA(state.newText[al])}" oninput="state.newText[state.activeLlista]=this.value" onkeydown="if(event.key==='Enter')addTask()">
        <button class="add-btn" onclick="addTask()">Afegir</button>
      </div>`
    :`<div class="add-row"><input type="text" id="new-text" placeholder="Nova tasca..." value="${escA(state.newText[al])}" oninput="state.newText[state.activeLlista]=this.value" onkeydown="if(event.key==='Enter')addTask()"></div>
     <div class="add-row">
       <select id="new-prio" onchange="state.newPrio[state.activeLlista]=this.value" style="flex:1">${PRIOS.map(p=>`<option value="${p}" ${state.newPrio[al]===p?'selected':''}>${PL[p]}</option>`).join('')}</select>
       <select id="new-user" onchange="state.newPerson[state.activeLlista]=this.value" style="flex:1">${USUARIS.map(u=>`<option value="${u}" ${state.newPerson[al]===u?'selected':''}>${UL[u]}</option>`).join('')}</select>
     </div>
     <div class="add-row">
       <span class="row-label">Data límit:</span>
       <input type="date" id="new-deadline" value="${state.newDeadline[al]||''}" min="${today}" onchange="state.newDeadline[state.activeLlista]=this.value" style="flex:1">
       <button class="add-btn" onclick="addTask()">Afegir</button>
     </div>`;

  document.getElementById('llista-content').innerHTML=`
    <div class="list-meta"><h2>${list.icon} ${list.name}</h2><p>${list.desc} · ${pending.length} pendents</p></div>
    <div class="add-form">${formRows}</div>
    <div class="tasks">
      ${pending.length===0&&done.length===0?'<div class="empty">Cap tasca. Tot en ordre! 🎉</div>':''}
      ${pending.map(tHtml).join('')}
      ${done.length>0?'<div class="section-label">Completades</div>':''}
      ${done.map(tHtml).join('')}
    </div>${ss}`;
}

function setLlista(id){state.activeLlista=id;save();renderTasques();setTimeout(()=>document.getElementById('new-text')?.focus(),80);}

function addTask(){
  const input=document.getElementById('new-text');
  const text=(input?input.value:state.newText[state.activeLlista]).trim();
  if(!text)return;
  const al=state.activeLlista;
  const isS=LLISTES.find(l=>l.id===al).isSuper;
  const deadline=isS?'':(document.getElementById('new-deadline')?.value||state.newDeadline[al]||'');
  const user=isS?'familia':state.newPerson[al];
  const prio=isS?'baixa':state.newPrio[al];
  state.tasks[al].push({id:state.nextId++,text,user,prio,deadline,done:false});
  if(al==='super'&&!state.savedSuper.includes(text))state.savedSuper.push(text);
  state.newText[al]='';if(!isS)state.newDeadline[al]='';
  save();renderTasques();updateBadge();
  setTimeout(()=>document.getElementById('new-text')?.focus(),80);
}

function addSaved(text){
  if(state.tasks['super'].some(t=>t.text===text&&!t.done))return;
  state.tasks['super'].push({id:state.nextId++,text,user:'familia',prio:'baixa',deadline:'',done:false});
  save();renderTasques();
}

function toggleTask(id){
  const al=state.activeLlista;
  const task=state.tasks[al].find(t=>t.id===id);
  if(!task)return;
  if(al!=='super'){
    task.done=true;save();renderTasques();
    setTimeout(()=>{state.tasks[al]=state.tasks[al].filter(t=>t.id!==id);save();renderTasques();updateBadge();},500);
  }else{task.done=!task.done;save();renderTasques();}
}

function deleteTask(id){
  for(const l of Object.keys(state.tasks))state.tasks[l]=state.tasks[l].filter(t=>t.id!==id);
  save();renderTasques();updateBadge();
}

/* ---- CALENDARI ---- */
function changeWeek(d){weekOffset+=d;renderCal();}
function renderCal(){
  const today=new Date();today.setHours(0,0,0,0);
  const dow=today.getDay();
  const mon=new Date(today);mon.setDate(today.getDate()-(dow===0?6:dow-1)+weekOffset*7);
  const days=Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
  document.getElementById('week-label').textContent=`${days[0].getDate()} ${MESOS[days[0].getMonth()].slice(0,3)} – ${days[6].getDate()} ${MESOS[days[6].getMonth()].slice(0,3)}`;
  const allT=Object.values(state.tasks).flat().filter(t=>!t.done&&t.deadline);
  document.getElementById('week-grid').innerHTML=days.map(d=>{
    const iso=toISO(d),isToday=d.getTime()===today.getTime();
    const dt=allT.filter(t=>t.deadline===iso);
    return`<div class="cal-day ${isToday?'today':''}">
      <div class="cal-day-name">${DIES[d.getDay()===0?6:d.getDay()-1]}</div>
      <div class="cal-day-num">${d.getDate()}</div>
      ${dt.slice(0,3).map(t=>{const ds=dStatus(t.deadline);return`<div class="cal-task-mini ${ds?ds.status:'ok'}">${esc(t.text)}</div>`;}).join('')}
    </div>`;
  }).join('');
  const urgent=allT.filter(t=>{const ds=dStatus(t.deadline);return ds&&ds.status!=='ok';}).sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));
  const coming=allT.filter(t=>{const ds=dStatus(t.deadline);return ds&&ds.status==='ok'&&ds.diff<=14;}).sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));
  let html='';
  if(urgent.length>0){
    html+=`<div class="urgents-title">⚠️ Atenció immediata</div><div class="tasks" style="margin-bottom:14px">`;
    html+=urgent.map(t=>{const ds=dStatus(t.deadline);return`<div class="task ${ds.status}"><div class="task-body"><div class="task-text">${esc(t.text)}</div><div class="task-meta"><span class="user-badge ${t.user}">${UL[t.user]}</span><span class="deadline-badge ${ds.status}">📅 ${ds.label}</span></div></div></div>`;}).join('');
    html+='</div>';
  }
  if(coming.length>0){
    html+=`<div class="urgents-title">📋 Pròximament (14 dies)</div><div class="tasks">`;
    html+=coming.map(t=>{const ds=dStatus(t.deadline);return`<div class="task prio-${t.prio}"><div class="task-body"><div class="task-text">${esc(t.text)}</div><div class="task-meta"><span class="user-badge ${t.user}">${UL[t.user]}</span><span class="deadline-badge ok">📅 ${ds.label}</span></div></div></div>`;}).join('');
    html+='</div>';
  }
  if(!urgent.length&&!coming.length)html='<div class="empty">Cap tasca amb data límit propera 🎉</div>';
  document.getElementById('urgents-section').innerHTML=html;
}

/* ---- SCAN TIQUET ---- */
async function scanReceipt(input){
  if(!input.files||!input.files[0])return;
  const file=input.files[0];

  const preview=document.getElementById('scan-preview');
  const status=document.getElementById('scan-status');

  const objUrl=URL.createObjectURL(file);
  preview.src=objUrl;preview.style.display='block';
  status.innerHTML='<div class="spinner"></div> Analitzant el tiquet…';

  // Compress image before sending
  const compressed=await compressImage(file,800);
  const base64=compressed.split(',')[1];
  const mediaType='image/jpeg';

  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:400,
        messages:[{
          role:'user',
          content:[
            {type:'image',source:{type:'base64',media_type:mediaType,data:base64}},
            {type:'text',text:`Analitza aquest tiquet o factura. Respon ÚNICAMENT amb JSON vàlid, sense cap altre text ni marques de codi markdown. Format exacte:
{"desc":"nom curt del comerç o tipus de despesa (màx 30 caràcters)","import":12.50,"cat":"alimentacio"}
Categories possibles: alimentacio, transport, casa, oci, salut, roba, altres.
Si no es llegeix l'import, posa 0. Si no es llegeix el comerç, posa "Despesa".`}
          ]
        }]
      })
    });

    if(!resp.ok){
      const err=await resp.json().catch(()=>({}));
      throw new Error(err.error?.message||`Error ${resp.status}`);
    }

    const data=await resp.json();
    const raw=(data.content||[]).map(b=>b.text||'').join('').trim();
    const clean=raw.replace(/^```(?:json)?\s*/,'').replace(/\s*```$/,'').trim();

    let parsed;
    try{parsed=JSON.parse(clean);}
    catch(e){throw new Error('No he pogut interpretar la resposta de la IA');}

    if(parsed.desc)document.getElementById('desp-desc').value=parsed.desc;
    if(parsed.import&&parsed.import>0)document.getElementById('desp-import').value=parseFloat(parsed.import).toFixed(2);
    if(parsed.cat&&CATS[parsed.cat])document.getElementById('desp-cat').value=parsed.cat;

    status.innerHTML='✅ Tiquet llegit! Revisa els camps i prem Afegir.';
    showToast('Tiquet escanejat!');

  }catch(err){
    console.error(err);
    status.innerHTML=`⚠️ ${err.message||'Error'} — omple els camps manualment.`;
  }
  input.value='';
}

function compressImage(file,maxSize){
  return new Promise((resolve)=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      let w=img.width,h=img.height;
      if(w>h&&w>maxSize){h=Math.round(h*maxSize/w);w=maxSize;}
      else if(h>maxSize){w=Math.round(w*maxSize/h);h=maxSize;}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      resolve(canvas.toDataURL('image/jpeg',0.85));
    };
    img.onerror=()=>{
      const reader=new FileReader();
      reader.onload=e=>resolve(e.target.result);
      reader.readAsDataURL(file);
    };
    img.src=url;
  });
}

/* ---- DESPESES ---- */
function addDespesa(){
  const desc=document.getElementById('desp-desc').value.trim();
  const imp=parseFloat(document.getElementById('desp-import').value);
  const cat=document.getElementById('desp-cat').value;
  const qui=document.getElementById('desp-qui').value;
  if(!desc||isNaN(imp)||imp<=0){alert("Omple la descripció i l'import!");return;}
  const now=new Date();
  state.despeses.push({id:state.nextId++,desc,import:imp,cat,qui,any:now.getFullYear(),mes:now.getMonth()});
  document.getElementById('desp-desc').value='';
  document.getElementById('desp-import').value='';
  document.getElementById('scan-preview').style.display='none';
  document.getElementById('scan-status').innerHTML='';
  save();renderDespeses();showToast('Despesa afegida!');
}

function changeMonth(d){viewMonth=new Date(viewMonth.getFullYear(),viewMonth.getMonth()+d,1);renderDespeses();}

function setDespFilter(f){state.despFilter=f;save();renderDespesesLlista();}

function renderDespeses(){
  const y=viewMonth.getFullYear(),m=viewMonth.getMonth();
  document.getElementById('month-label').textContent=`${MESOS[m]} ${y}`;
  const desp=state.despeses.filter(d=>d.any===y&&d.mes===m);
  const pm=m===0?11:m-1,py=m===0?y-1:y;
  const prev=state.despeses.filter(d=>d.any===py&&d.mes===pm);
  const prevLabel=`${MESOS[pm].slice(0,3)} ${py}`;

  const totP=desp.filter(d=>d.qui==='pare').reduce((s,d)=>s+d.import,0);
  const totM=desp.filter(d=>d.qui==='mare').reduce((s,d)=>s+d.import,0);
  const totF=desp.filter(d=>d.qui==='familia').reduce((s,d)=>s+d.import,0);

  document.getElementById('totals-row').innerHTML=`
    <div class="resum-card"><div class="label">Pare</div><div class="amount pare">${fmt(totP)}</div></div>
    <div class="resum-card"><div class="label">Mare</div><div class="amount mare">${fmt(totM)}</div></div>
    <div class="resum-card"><div class="label">Família</div><div class="amount familia">${fmt(totF)}</div></div>
    <div class="resum-card"><div class="label">Total</div><div class="amount">${fmt(totP+totM+totF)}</div></div>`;

  const byCat={},byCatP={};
  Object.keys(CATS).forEach(c=>{byCat[c]={pare:0,mare:0,familia:0,total:0};byCatP[c]=0;});
  desp.forEach(d=>{byCat[d.cat][d.qui]=(byCat[d.cat][d.qui]||0)+d.import;byCat[d.cat].total+=d.import;});
  prev.forEach(d=>{byCatP[d.cat]+=d.import;});
  const maxV=Math.max(...Object.values(byCat).map(v=>v.total),...Object.values(byCatP),0.01);
  const active=Object.entries(CATS).filter(([k])=>byCat[k].total>0||byCatP[k]>0);

  const bars=active.map(([k,v])=>{
    const curr=byCat[k].total,pr=byCatP[k];
    const pc=Math.round(curr/maxV*100),pp=Math.round(pr/maxV*100);
    return`<div class="bar-group">
      <div class="bar-cat-label">${v.label}</div>
      <div class="bar-row-inner"><span class="bar-who">Ara</span><div class="bar-track"><div class="bar-fill" style="width:${pc}%;background:${v.color}">${curr>0?`<span class="bar-val">${fmt(curr)}</span>`:''}</div></div></div>
      <div class="bar-row-inner"><span class="bar-who">${prevLabel}</span><div class="bar-track"><div class="bar-fill" style="width:${pp}%;background:${v.color};opacity:0.3">${pr>0?`<span class="bar-val" style="color:var(--text2)">${fmt(pr)}</span>`:''}</div></div></div>
    </div>`;
  }).join('');

  document.getElementById('chart-wrap').innerHTML=desp.length===0&&prev.length===0
    ?'<div class="no-data">Cap despesa registrada</div>'
    :`<div class="chart-title">Per categoria</div>
      <div class="chart-legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--text)"></div>Mes actual</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--text3)"></div>${prevLabel}</div>
      </div>${bars}`;

  // Filter tabs
  const f=state.despFilter||'all';
  document.getElementById('desp-filter-tabs').innerHTML=`
    <div class="ptab all ${f==='all'?'active':''}" onclick="setDespFilter('all')">Tots</div>
    <div class="ptab pare ${f==='pare'?'active':''}" onclick="setDespFilter('pare')">👨 Pare</div>
    <div class="ptab mare ${f==='mare'?'active':''}" onclick="setDespFilter('mare')">👩 Mare</div>
    <div class="ptab familia ${f==='familia'?'active':''}" onclick="setDespFilter('familia')">👨‍👩‍👧 Família</div>`;

  renderDespesesLlista();
}

function renderDespesesLlista(){
  const y=viewMonth.getFullYear(),m=viewMonth.getMonth();
  const f=state.despFilter||'all';
  let desp=state.despeses.filter(d=>d.any===y&&d.mes===m);
  if(f!=='all')desp=desp.filter(d=>d.qui===f);
  const sorted=[...desp].sort((a,b)=>b.id-a.id);
  document.getElementById('despeses-llista').innerHTML=sorted.length===0
    ?'<div class="empty">Cap despesa</div>'
    :`<div class="section-label">${sorted.length} despesa${sorted.length!==1?'s':''}</div>`+
    sorted.map(d=>`<div class="despesa-item">
      <div class="desp-cat-dot" style="background:${CATS[d.cat].color}"></div>
      <div class="desp-info"><div class="desp-desc">${esc(d.desc)}</div><div class="desp-meta">${CATS[d.cat].label} · <span style="font-weight:500">${UL[d.qui]}</span></div></div>
      <div class="desp-amount ${d.qui}">${fmt(d.import)}</div>
      <button class="del-btn" onclick="delD(${d.id})">×</button>
    </div>`).join('');
}

function delD(id){state.despeses=state.despeses.filter(d=>d.id!==id);save();renderDespeses();}

// Init
render();
</script>
